name: Build DrawFlow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npm run build:mac

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: DrawFlow-mac-dmg
          path: dist/DrawFlow-mac.dmg

      - name: Upload macOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DrawFlow-mac-zip
          path: dist/DrawFlow-mac.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run build:win

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: DrawFlow-win-exe
          path: dist/DrawFlow Setup.exe

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DrawFlow-win-zip
          path: dist/DrawFlow-win.zip

      - name: Test Windows App
        run: |
          # 检查打包产物是否存在
          if (Test-Path "dist/DrawFlow Setup.exe") {
            Write-Host "Windows installer exists"
          }
          if (Test-Path "dist/win-unpacked/DrawFlow.exe") {
            Write-Host "Windows app exists"
            # 尝试启动并检查输出
            $proc = Start-Process -FilePath "dist/win-unpacked/DrawFlow.exe" -PassThru -NoNewWindow
            Start-Sleep -Seconds 10
            $proc.Kill()
          }
