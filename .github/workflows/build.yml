name: Build DrawFlow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npm run build:mac

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: DrawFlow-mac-dmg
          path: dist/DrawFlow-mac.dmg

      - name: Upload macOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DrawFlow-mac-zip
          path: dist/DrawFlow-mac.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run build:win

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: DrawFlow-win-exe
          path: dist/DrawFlow Setup.exe

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DrawFlow-win-zip
          path: dist/DrawFlow-win.zip
